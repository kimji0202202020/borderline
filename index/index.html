<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>borderline</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Nanum+Myeongjo:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/dompurify/3.0.6/purify.min.js"></script>
</head>
<body>
    <div id="login-container">
        <div class="login-box">
            <div class="logo">
                <div class="logo-icon">B</div>
                <h1>borderline</h1>
            </div>
            <p>당신의 이야기를 완성하는 공간</p>
            <button id="login-btn">
                <span>Google 계정으로 시작하기</span>
            </button>
            <div id="firebase-error-message">
                <strong>Firebase 연결 실패!</strong><br>
                firebase-config.js 파일 설정을 확인해주세요.
            </div>
        </div>
    </div>

    <div id="app-container">
        <div class="overlay" id="overlay"></div>
        <nav class="sidebar" id="main-nav">
            <div class="sidebar-header">
                <div class="logo">
                    <div class="logo-icon">B</div>
                    <h2>borderline</h2>
                </div>
            </div>
            <div class="nav-tabs">
                <button class="nav-tab active" data-tab="projects">프로젝트</button>
                <button class="nav-tab" data-tab="scenes">장면</button>
                <button class="nav-tab" data-tab="characters">인물</button>
                <button class="nav-tab" data-tab="memo">메모</button>
            </div>
            <div class="nav-content">
                <div class="tab-pane active" id="projects-pane">
                    <div class="project-list" id="project-list"></div>
                </div>
                <div class="tab-pane" id="scenes-pane">
                    <div class="scene-list" id="scene-list">장면 없음</div>
                </div>
                <div class="tab-pane" id="characters-pane">
                    <div class="character-list" id="character-list">등장인물 없음</div>
                </div>
                <div class="tab-pane" id="memo-pane">
                    <textarea id="memo-editor" placeholder="메모를 입력하세요..."></textarea>
                </div>
            </div>
            <div class="sidebar-footer">
                 <button class="add-project-btn" id="add-project-btn">
                    <span>새 프로젝트 만들기</span>
                </button>
                <div class="user-profile">
                    <img id="user-photo" src="" alt="">
                    <span id="user-name"></span>
                    <button id="logout-btn" class="icon-btn" title="로그아웃">X</button>
                </div>
            </div>
        </nav>

        <main class="main-content">
            <header class="header">
                <div class="header-group">
                    <button class="icon-btn" id="toggle-nav-btn">☰</button>
                    <div id="current-project-title-wrapper">
                        <div id="current-project-title">프로젝트를 선택하세요</div>
                        <button class="icon-btn" id="rename-project-btn">✎</button>
                    </div>
                </div>
                <div class="header-group">
                    <div class="save-status" id="save-status">
                        <div class="save-indicator"></div>
                        <span></span>
                    </div>
                    <div class="zoom-controls" id="zoom-controls">
                        <button class="icon-btn" id="zoom-out-btn">-</button>
                        <button class="zoom-reset-btn" id="zoom-reset-btn">100%</button>
                        <button class="icon-btn" id="zoom-in-btn">+</button>
                    </div>
                    <button class="action-btn" id="export-btn">내보내기</button>
                </div>
            </header>

            <div class="editor-area">
                <div class="editor-toolbar">
                    <div class="format-buttons">
                        <button class="format-btn" data-type="scene-heading">장면</button>
                        <button class="format-btn" data-type="action">행동</button>
                        <button class="format-btn" data-type="character">인물</button>
                        <button class="format-btn" data-type="dialogue">대사</button>
                        <button class="format-btn" data-type="parenthetical">지시</button>
                    </div>
                </div>
                <div class="screenplay-container" id="screenplay-container">
                    <div class="screenplay-editor" id="editor" contenteditable="true" spellcheck="false"></div>
                </div>
            </div>
        </main>
    </div>

    <div class="modal-overlay" id="new-project-modal">
        <div class="modal-content">
            <h3>새 프로젝트 만들기</h3>
            <input type="text" id="new-project-name" placeholder="프로젝트 이름">
            <div class="modal-actions">
                <button class="modal-btn secondary" data-action="close">취소</button>
                <button class="modal-btn primary" id="create-project-btn">만들기</button>
            </div>
        </div>
    </div>
    <div class="modal-overlay" id="export-modal">
        <div class="modal-content">
            <h3>내보내기</h3>
            <div class="export-options">
                <button class="export-option" data-format="txt">텍스트 파일 (.txt)</button>
                <button class="export-option" data-format="pdf">PDF 문서 (.pdf)</button>
            </div>
            <div class="modal-actions">
                <button class="modal-btn secondary" data-action="close">닫기</button>
            </div>
        </div>
    </div>
    <div class="modal-overlay" id="confirm-delete-modal">
        <div class="modal-content">
            <h3>삭제 확인</h3>
            <p id="confirm-delete-message"></p>
            <div class="modal-actions">
                <button class="modal-btn secondary" data-action="close">취소</button>
                <button class="modal-btn danger" id="confirm-delete-btn">삭제</button>
            </div>
        </div>
    </div>
    <div class="modal-overlay" id="rename-project-modal">
        <div class="modal-content">
            <h3>이름 변경</h3>
            <input type="text" id="rename-project-name">
            <div class="modal-actions">
                <button class="modal-btn secondary" data-action="close">취소</button>
                <button class="modal-btn primary" id="save-rename-btn">저장</button>
            </div>
        </div>
    </div>
    
    <div id="toast-container"></div>
    
    <script type="module" src="main.js"></script>
</body>
</html>
